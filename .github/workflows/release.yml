name: Release

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: node esbuild.config.js

      - name: Publish to npm (latest)
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          URL="https://registry.npmjs.org/abtars/-/abtars-${VERSION}.tgz"
          # Wait for npm to propagate
          sleep 10
          SHA=$(curl -sL "$URL" | shasum -a 256 | cut -d' ' -f1)
          echo "version=$VERSION url=$URL sha=$SHA"
          # Clone tap, update formula, push
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/aksika/homebrew-tap.git" /tmp/tap
          cd /tmp/tap
          sed -i "s|url \".*\"|url \"${URL}\"|" Formula/abtars.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" Formula/abtars.rb
          git config user.name "aksika"
          git config user.email "aksika@gmail.com"
          git add Formula/abtars.rb
          git commit -m "abtars ${VERSION}" || echo "no change"
          git push

  verify-install:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install from npm
        run: pnpm install -g abtars abmind

      - name: Verify CLI runs
        run: abtars --help

      - name: Verify version matches
        run: |
          EXPECTED=$(pnpm view abtars version)
          ACTUAL=$(abtars --version 2>&1 | head -1)
          echo "npm=$EXPECTED installed=$ACTUAL"
