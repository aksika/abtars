name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Check shared utilities
        run: ./scripts/check-shared-utils.sh

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: node esbuild.config.js

      - name: Test
        run: npm test -- --silent

      - name: Smoke test (install + help)
        run: |
          node bundle/abtars-cli.js --help
