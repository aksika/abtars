name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: aksika/abmind
          ref: dev
          path: ../abmind

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npx tsc --noEmit

      - name: Build bundle
        run: node esbuild.config.js

      - name: Test
        run: npm test -- --silent 2>&1 | tail -20

      - name: Smoke test (install + help)
        run: |
          node bundle/abtars-cli.js --help
          node bundle/abtars-cli.js install --mode=simple --force
          node bundle/abtars-cli.js doctor 2>&1 || true
