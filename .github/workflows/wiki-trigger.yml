name: Trigger wiki rebuild

on:
  push:
    branches: [dev]
    paths: [docs/wiki/**]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger pages rebuild
        run: |
          HTTP_CODE=$(curl -s -o /tmp/dispatch-response.txt -w "%{http_code}" -X POST \
            "https://api.github.com/repos/aksika/aksika.github.io/dispatches" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.WIKI_DISPATCH_TOKEN }}" \
            -d '{"event_type":"wiki-updated","client_payload":{"source":"abtars"}}')
          echo "HTTP $HTTP_CODE"
          cat /tmp/dispatch-response.txt
          if [ "$HTTP_CODE" != "204" ]; then exit 1; fi
